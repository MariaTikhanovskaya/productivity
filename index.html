<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Daily Todo Organizer</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,600;9..144,700&family=Manrope:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main class="app-shell">
    <section class="hero">
      <div class="hero-topline">
        <p class="eyebrow">Daily page</p>
        <button id="hero-sign-out-button" type="button" class="secondary-button hero-sign-out hidden">Sign out</button>
      </div>
      <h1 id="today-label">Today</h1>
      <p class="subtitle">
        Unfinished tasks stay visible each day and remain grouped by when you first created them.
      </p>
    </section>

    <section class="auth card">
      <div class="section-heading auth-heading">
        <div>
          <h2>Sync across devices</h2>
          <p id="auth-status" class="meta">Checking sign-in state...</p>
        </div>
      </div>

      <form id="auth-form" class="task-form">
        <label class="form-label" for="email-input">Email address</label>
        <div class="input-row">
          <input id="email-input" name="email" type="email" placeholder="you@example.com" required>
          <button id="sign-in-button" type="submit">Email me a link</button>
        </div>
      </form>
    </section>

    <section class="composer card">
      <form id="task-form" class="task-form">
        <label class="form-label" for="task-input">Add a task</label>
        <div class="input-row">
          <input id="task-input" name="task" type="text" maxlength="160" placeholder="Reply to emails, call doctor, finish budget..." required>
          <button type="submit">Add</button>
        </div>
        <p id="task-category-preview" class="meta">New tasks will be labeled as work or personal automatically.</p>
      </form>
    </section>

    <section class="list card">
      <div class="section-heading">
        <h2>Open tasks</h2>
        <div class="section-actions">
          <button id="toggle-done-button" type="button" class="link-button">Done tasks</button>
          <p id="task-count" class="meta"></p>
        </div>
      </div>
      <div id="task-groups" class="task-groups"></div>
      <template id="section-template">
        <section class="task-section">
          <div class="section-heading">
            <h3 class="section-title"></h3>
            <p class="section-meta meta"></p>
          </div>
          <div class="task-groups"></div>
        </section>
      </template>
      <section id="done-section" class="done-section hidden">
        <div class="section-heading done-heading">
          <h2>Done tasks</h2>
          <p id="done-count" class="meta"></p>
        </div>
        <ul id="done-list" class="task-list"></ul>
      </section>
      <template id="group-template">
        <article class="task-group">
          <div class="group-header">
            <h3 class="group-title"></h3>
            <p class="group-meta"></p>
          </div>
          <div class="task-columns">
            <section class="task-column" data-category="work">
              <div class="column-header">
                <h4>Work</h4>
              </div>
              <ul class="task-list"></ul>
            </section>
            <section class="task-column" data-category="personal">
              <div class="column-header">
                <h4>Personal</h4>
              </div>
              <ul class="task-list"></ul>
            </section>
          </div>
        </article>
      </template>
      <template id="task-template">
        <li class="task-item">
          <label class="task-label">
            <input class="task-checkbox" type="checkbox">
            <span class="task-content">
              <span class="task-text"></span>
              <span class="task-category-badge"></span>
            </span>
          </label>
          <div class="task-actions">
            <label class="category-control">
              <span class="sr-only">Task category</span>
              <select class="task-category-select" aria-label="Task category">
                <option value="work">Work</option>
                <option value="personal">Personal</option>
              </select>
            </label>
            <button class="delete-button" type="button" aria-label="Delete task">Delete</button>
          </div>
        </li>
      </template>
    </section>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="config.js"></script>
  <script src="app.js"></script>
</body>
</html>
